name: Build FindFile Windows

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build FindFile.exe + FindFileIndexer.exe
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Configure C++ indexer
        run: cmake -S indexer -B build-indexer -A x64

      - name: Build C++ indexer
        run: cmake --build build-indexer --config Release

      - name: Publish WPF desktop app
        run: >-
          dotnet publish desktop/FindFile.Desktop/FindFile.Desktop.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true
          /p:PublishDir=${{ github.workspace }}/publish/FindFile-Windows/

      - name: Copy indexer next to app
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish/FindFile-Windows"
          $indexerCandidates = @(
            (Join-Path $env:GITHUB_WORKSPACE "build-indexer/Release/FindFileIndexer.exe"),
            (Join-Path $env:GITHUB_WORKSPACE "build-indexer/src/Release/FindFileIndexer.exe"),
            (Join-Path $env:GITHUB_WORKSPACE "build-indexer/FindFileIndexer.exe")
          )

          $indexerPath = $indexerCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $indexerPath) {
            Write-Host "Indexer candidates checked:"
            $indexerCandidates | ForEach-Object { Write-Host " - $_" }
            throw "FindFileIndexer.exe not found after C++ build."
          }

          Copy-Item $indexerPath (Join-Path $publishDir "FindFileIndexer.exe") -Force

      - name: Add default folders and info files
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish/FindFile-Windows"
          New-Item -ItemType Directory -Force -Path (Join-Path $publishDir "data") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $publishDir "logs") | Out-Null

          $readme = @"
          FindFile Windows build

          Files:
          - FindFile.exe: WPF/XAML desktop interface
          - FindFileIndexer.exe: C++ indexing engine
          - data/: index storage folder
          - logs/: log folder
          "@
          Set-Content -Path (Join-Path $publishDir "README.txt") -Value $readme -Encoding UTF8

      - name: Create zip package
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish/FindFile-Windows"
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "FindFile-Windows.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path (Join-Path $publishDir "*") -DestinationPath $zipPath -Force

      - name: Show package contents
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish/FindFile-Windows"
          Get-ChildItem $publishDir | Select-Object Name, Length, LastWriteTime
          Write-Host "ZIP: $env:GITHUB_WORKSPACE/FindFile-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FindFile-Windows
          path: FindFile-Windows.zip
          if-no-files-found: error
