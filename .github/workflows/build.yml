name: Build FindFile Windows

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

  workflow_dispatch:

permissions:
  contents: write

env:
  APP_ID: findfile
  APP_NAME: FindFile
  MAIN_EXE: FindFile.exe
  PACKAGE_NAME: FindFile-win-x64.zip

  LVK_UPDATER_VERSION: v0.1.0
  UPDATE_FEED_REPO: vitalya482-glitch/LVK-Update-Feed
  UPDATE_FEED_BRANCH: main
  UPDATE_FEED_MANIFEST_PATH: manifests/findfile.json
  UPDATE_MANIFEST_URL: https://raw.githubusercontent.com/vitalya482-glitch/LVK-Update-Feed/main/manifests/findfile.json

  DEV_RELEASE_TAG: dev-latest

jobs:
  build-windows:
    name: Build native FindFile.exe + FindFileIndexer.exe
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from VERSION file
        shell: pwsh
        run: |
          if (-not (Test-Path "VERSION")) {
            throw "VERSION file not found in repository root."
          }

          $baseVersion = (Get-Content "VERSION" -Raw).Trim()

          if ([string]::IsNullOrWhiteSpace($baseVersion)) {
            throw "VERSION file is empty."
          }

          if ($baseVersion.StartsWith("v")) {
            $baseVersion = $baseVersion.Substring(1)
          }

          if ($baseVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "VERSION must be in format 0.2.0, current value: $baseVersion"
          }

          $devVersion = "$baseVersion.${{ github.run_number }}"

          "BASE_VERSION=$baseVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CLEAN_VERSION=$devVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_VERSION=${{ env.DEV_RELEASE_TAG }}" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "Base version: $baseVersion"
          Write-Host "Dev version: $devVersion"
          Write-Host "Release tag: ${{ env.DEV_RELEASE_TAG }}"

      - name: Set publish mode
        shell: pwsh
        run: |
          $publishDevLatest = "false"

          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}" -eq "refs/heads/main") {
            $publishDevLatest = "true"
          }

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $publishDevLatest = "true"
          }

          "PUBLISH_DEV_LATEST=$publishDevLatest" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Publish dev-latest: $publishDevLatest"

      - name: Configure native C++ GUI
        run: cmake -S desktop/FindFile.Native -B build-gui -A x64

      - name: Build native C++ GUI
        run: cmake --build build-gui --config Release

      - name: Configure C++ indexer
        run: cmake -S indexer -B build-indexer -A x64

      - name: Build C++ indexer
        run: cmake --build build-indexer --config Release

      - name: Prepare publish folder
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish/FindFile-Windows"
          if (Test-Path $publishDir) {
            Remove-Item $publishDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $publishDir | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $publishDir "data") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $publishDir "logs") | Out-Null

      - name: Copy native GUI
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish/FindFile-Windows"
          $guiCandidates = @(
            (Join-Path $env:GITHUB_WORKSPACE "build-gui/Release/FindFile.exe"),
            (Join-Path $env:GITHUB_WORKSPACE "build-gui/FindFile.exe")
          )

          $guiPath = $guiCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $guiPath) {
            Write-Host "GUI candidates checked:"
            $guiCandidates | ForEach-Object { Write-Host " - $_" }
            throw "FindFile.exe not found after native GUI build."
          }

          Copy-Item $guiPath (Join-Path $publishDir "FindFile.exe") -Force
          Write-Host "Copied native GUI: $guiPath"

      - name: Copy indexer next to app
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish/FindFile-Windows"

          $indexerCandidates = @(
            (Join-Path $env:GITHUB_WORKSPACE "build-indexer/Release/FindFileIndexer.exe"),
            (Join-Path $env:GITHUB_WORKSPACE "build-indexer/src/Release/FindFileIndexer.exe"),
            (Join-Path $env:GITHUB_WORKSPACE "build-indexer/FindFileIndexer.exe")
          )

          $indexerPath = $indexerCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $indexerPath) {
            Write-Host "Indexer candidates checked:"
            $indexerCandidates | ForEach-Object { Write-Host " - $_" }
            throw "FindFileIndexer.exe not found after C++ build."
          }

          Copy-Item $indexerPath (Join-Path $publishDir "FindFileIndexer.exe") -Force
          Write-Host "Copied indexer: $indexerPath"

      - name: Download LVKUpdater
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.LVK_PRIVATE_REPO_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
            throw "Secret LVK_PRIVATE_REPO_TOKEN is missing. It is required to download LVKUpdater from private repository."
          }

          $toolsDir = Join-Path $env:GITHUB_WORKSPACE "tools"
          New-Item -ItemType Directory -Force -Path $toolsDir | Out-Null

          $updaterExtract = Join-Path $toolsDir "LVKUpdater"

          if (Test-Path $updaterExtract) {
            Remove-Item $updaterExtract -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $updaterExtract | Out-Null

          gh release download "${{ env.LVK_UPDATER_VERSION }}" `
            --repo "vitalya482-glitch/LVK-Updater" `
            --pattern "LVKUpdater-win-x64.zip" `
            --dir $toolsDir `
            --clobber

          $updaterZip = Join-Path $toolsDir "LVKUpdater-win-x64.zip"

          if (-not (Test-Path $updaterZip)) {
            throw "LVKUpdater-win-x64.zip was not downloaded."
          }

          Expand-Archive -Path $updaterZip -DestinationPath $updaterExtract -Force

          $updaterExe = Get-ChildItem $updaterExtract -Recurse -Filter "LVKUpdater.exe" | Select-Object -First 1

          if (-not $updaterExe) {
            throw "LVKUpdater.exe not found inside downloaded package."
          }

          $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish/FindFile-Windows"
          Copy-Item $updaterExe.FullName (Join-Path $publishDir "LVKUpdater.exe") -Force

          Write-Host "LVKUpdater copied to package."

      - name: Add update config and readme
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish/FindFile-Windows"

          $appUpdate = [ordered]@{
            schemaVersion = 1
            appId = "${{ env.APP_ID }}"
            name = "${{ env.APP_NAME }}"
            currentVersion = "$env:CLEAN_VERSION"
            channel = "stable"
            mainExe = "${{ env.MAIN_EXE }}"
            manifestUrl = "${{ env.UPDATE_MANIFEST_URL }}"
          }

          $appUpdateJson = $appUpdate | ConvertTo-Json -Depth 10
          Set-Content -Path (Join-Path $publishDir "app.update.json") -Value $appUpdateJson -Encoding UTF8

          $readme = @"
          FindFile native Windows build

          Version: $env:CLEAN_VERSION

          Files:
          - FindFile.exe: native C++ WinAPI interface
          - FindFileIndexer.exe: C++ indexing engine
          - LVKUpdater.exe: update installer
          - app.update.json: local update config
          - data/: index storage folder
          - logs/: log folder
          "@

          Set-Content -Path (Join-Path $publishDir "README.txt") -Value $readme -Encoding UTF8

      - name: Create zip package
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish/FindFile-Windows"
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "${{ env.PACKAGE_NAME }}"

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $publishDir "*") -DestinationPath $zipPath -Force

          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLower()
          $size = (Get-Item $zipPath).Length

          "PACKAGE_SHA256=$hash" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PACKAGE_SIZE=$size" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "Package: $zipPath"
          Write-Host "SHA256: $hash"
          Write-Host "Size: $size"

      - name: Show package contents
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "publish/FindFile-Windows"
          Get-ChildItem $publishDir | Select-Object Name, Length, LastWriteTime
          Write-Host "ZIP: $env:GITHUB_WORKSPACE/${{ env.PACKAGE_NAME }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FindFile-win-x64
          path: FindFile-win-x64.zip
          if-no-files-found: error

      - name: Delete old dev-latest release
        if: ${{ env.PUBLISH_DEV_LATEST == 'true' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ env.DEV_RELEASE_TAG }}" --repo "${{ github.repository }}" *> $null

          if ($LASTEXITCODE -eq 0) {
            Write-Host "Old dev-latest release found. Deleting..."
            gh release delete "${{ env.DEV_RELEASE_TAG }}" --repo "${{ github.repository }}" --yes --cleanup-tag

            if ($LASTEXITCODE -ne 0) {
              throw "Failed to delete old dev-latest release."
            }

            Write-Host "Old dev-latest release deleted."
          }
          else {
            Write-Host "No old dev-latest release found. Continue."
          }

          exit 0

      - name: Create dev-latest release
        if: ${{ env.PUBLISH_DEV_LATEST == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DEV_RELEASE_TAG }}
          name: FindFile dev-latest
          body: |
            FindFile automatic native C++ dev build.

            Version:
            ${{ env.CLEAN_VERSION }}

            Commit:
            ${{ github.sha }}

            Package:
            - FindFile-win-x64.zip
            - SHA256: ${{ env.PACKAGE_SHA256 }}
            - Size: ${{ env.PACKAGE_SIZE }} bytes
          files: FindFile-win-x64.zip

      - name: Update LVK Update Feed
        if: ${{ env.PUBLISH_DEV_LATEST == 'true' }}
        shell: pwsh
        env:
          LVK_UPDATE_FEED_TOKEN: ${{ secrets.LVK_UPDATE_FEED_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:LVK_UPDATE_FEED_TOKEN)) {
            throw "Secret LVK_UPDATE_FEED_TOKEN is missing. It is required to update LVK-Update-Feed."
          }

          $feedDir = Join-Path $env:GITHUB_WORKSPACE "LVK-Update-Feed"

          git clone "https://x-access-token:$env:LVK_UPDATE_FEED_TOKEN@github.com/${{ env.UPDATE_FEED_REPO }}.git" $feedDir

          $manifestPath = Join-Path $feedDir "${{ env.UPDATE_FEED_MANIFEST_PATH }}"
          $releaseDate = (Get-Date).ToString("yyyy-MM-dd")
          $packageUrl = "https://github.com/${{ github.repository }}/releases/download/${{ env.DEV_RELEASE_TAG }}/${{ env.PACKAGE_NAME }}"

          $manifest = [ordered]@{
            schemaVersion = 1
            appId = "${{ env.APP_ID }}"
            name = "${{ env.APP_NAME }}"
            latestVersion = "$env:CLEAN_VERSION"
            channel = "stable"
            mandatory = $false
            releaseDate = $releaseDate
            mainExe = "${{ env.MAIN_EXE }}"
            package = [ordered]@{
              url = $packageUrl
              sha256 = "$env:PACKAGE_SHA256"
              size = [int64]$env:PACKAGE_SIZE
            }
            notes = @(
              "Автоматическая native C++ dev-сборка FindFile.",
              "Commit: ${{ github.sha }}"
            )
          }

          $manifestJson = $manifest | ConvertTo-Json -Depth 10
          Set-Content -Path $manifestPath -Value $manifestJson -Encoding UTF8

          Set-Location $feedDir
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add "${{ env.UPDATE_FEED_MANIFEST_PATH }}"
          git commit -m "Update FindFile native dev manifest to $env:CLEAN_VERSION" || echo "No changes to commit"
          git push origin "${{ env.UPDATE_FEED_BRANCH }}"
