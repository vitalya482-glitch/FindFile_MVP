name: Build FindFile App

on:
  push:
    branches:
      - main
      - feature/cpp-indexer
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-app:
    name: Build Python GUI
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build FindFile.exe
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --windowed --name FindFile app.py

      - name: Upload FindFile artifact
        uses: actions/upload-artifact@v4
        with:
          name: FindFile-GUI
          path: dist/FindFile.exe
          if-no-files-found: error
