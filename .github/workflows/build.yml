name: Build FindFile

on:
  push:
    branches: [ main ]

  workflow_dispatch:
    inputs:
      package:
        description: "Which package to upload"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - app
          - runtime
          - data

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build application
        run: |
          pyinstaller --onedir --windowed --name FindFile --contents-directory runtime app.py

      - name: Prepare data folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/FindFile/data"

          if (Test-Path "file_index.db") {
            Copy-Item "file_index.db" "dist/FindFile/data/file_index.db" -Force
          }

          if (Test-Path "settings.json") {
            Copy-Item "settings.json" "dist/FindFile/data/settings.json" -Force
          } else {
            "{}" | Out-File -FilePath "dist/FindFile/data/settings.json" -Encoding utf8
          }

      - name: Upload FULL package
        if: ${{ github.event_name == 'push' || github.event.inputs.package == 'full' }}
        uses: actions/upload-artifact@v4
        with:
          name: FindFile_FULL
          path: dist/FindFile

      - name: Upload APP only
        if: ${{ github.event.inputs.package == 'app' }}
        uses: actions/upload-artifact@v4
        with:
          name: FindFile_APP_ONLY
          path: dist/FindFile/FindFile.exe

      - name: Upload RUNTIME only
        if: ${{ github.event.inputs.package == 'runtime' }}
        uses: actions/upload-artifact@v4
        with:
          name: FindFile_RUNTIME
          path: dist/FindFile/runtime

      - name: Upload DATA only
        if: ${{ github.event.inputs.package == 'data' }}
        uses: actions/upload-artifact@v4
        with:
          name: FindFile_DATA
          path: dist/FindFile/data