name: Build FindFile Indexer

on:
  push:
    branches:
      - main
      - feature/cpp-indexer
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-indexer:
    name: Build C++ Indexer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S indexer -B build-indexer -A x64

      - name: Build FindFileIndexer.exe
        shell: pwsh
        run: |
          cmake --build build-indexer --config Release

      - name: Upload FindFileIndexer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FindFile-Indexer
          path: build-indexer/Release/FindFileIndexer.exe
          if-no-files-found: error
