name: Build FindFile Indexer

on:
  push:
    branches: [ main, feature/cpp-indexer, feature/xaml-desktop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-indexer:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S indexer -B build-indexer -A x64

      - name: Build C++ indexer
        run: cmake --build build-indexer --config Release

      - name: Upload indexer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FindFile-Indexer
          path: build-indexer/Release/FindFileIndexer.exe
