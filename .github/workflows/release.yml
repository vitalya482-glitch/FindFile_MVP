name: Release FindFile Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build C++ indexer
        run: |
          cmake -S indexer -B build-indexer -A x64
          cmake --build build-indexer --config Release

      - name: Publish self-contained WPF app
        run: |
          dotnet publish desktop/FindFile.Desktop/FindFile.Desktop.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            -o publish/FindFile

      - name: Copy indexer to publish folder
        run: copy build-indexer\Release\FindFileIndexer.exe publish\FindFile\FindFileIndexer.exe

      - name: Create release zip
        run: Compress-Archive -Path publish\FindFile\* -DestinationPath FindFile-Windows.zip -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: FindFile-Windows
          path: FindFile-Windows.zip
